{% extends "admin/base.html" %}

{% block title %}Wish List{% endblock %}

{% block extra_css %}
<!-- TinyMCE CSS -->
<link href="https://cdn.tiny.cloud/1/no-api-key/tinymce/5/skins/ui/oxide/skin.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2 class="mb-0">Wish List Editor</h2>
    </div>
    <div class="card-body">
        <form id="wishlistForm" method="POST">
            <div class="mb-3">
                <textarea id="wishlist-editor" name="wishlist">{{ wishlist.wishlist }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- TinyMCE JS -->
<script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/5/tinymce.min.js"></script>
<script>
tinymce.init({
    selector: '#wishlist-editor',
    height: 500,
    menubar: true,
    plugins: [
        'advlist autolink lists link image charmap print preview anchor',
        'searchreplace visualblocks code fullscreen',
        'insertdatetime media table paste code help wordcount'
    ],
    toolbar: 'undo redo | formatselect | ' +
        'bold italic backcolor | alignleft aligncenter ' +
        'alignright alignjustify | bullist numlist outdent indent | ' +
        'removeformat | help',
    content_style: 'body { font-family:Helvetica,Arial,sans-serif; font-size:14px }'
});

document.getElementById('wishlistForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = {
        wishlist: tinymce.get('wishlist-editor').getContent()
    };

    try {
        const response = await fetch('/admin/wishlist', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        if (response.ok) {
            alert('Wishlist updated successfully!');
        } else {
            throw new Error('Failed to update wishlist');
        }
    } catch (error) {
        alert('Error: ' + error.message);
    }
});
</script>
{% endblock %}
