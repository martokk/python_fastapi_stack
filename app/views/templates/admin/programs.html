{% extends "admin/base.html" %}

{% block title %}Programs{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h2 class="mb-0">Programs</h2>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addProgramModal">
            <i class="fas fa-plus"></i> Add Program
        </button>
    </div>
    <div class="card-body">
        <div class="row" id="programList">
            {% for program in programs %}
            <div class="col-md-6 mb-4" id="program-{{ program.id }}">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">{{ program.name }}</h5>
                        <p class="card-text">{{ program.description }}</p>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-primary" onclick="editProgram({{ program.id }})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn btn-sm btn-info" onclick="window.location.href='/admin/faq?program={{ program.id }}'">
                                <i class="fas fa-question-circle"></i> FAQ
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteProgram({{ program.id }})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<!-- Add Program Modal -->
<div class="modal fade" id="addProgramModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Program</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addProgramForm">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" rows="3" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="submitProgramForm()">Add Program</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Program Modal -->
<div class="modal fade" id="editProgramModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Program</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editProgramForm">
                    <input type="hidden" id="editProgramId">
                    <div class="mb-3">
                        <label for="editName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="editName" required>
                    </div>
                    <div class="mb-3">
                        <label for="editDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="editDescription" rows="3" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateProgram()">Update Program</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Add new program
async function submitProgramForm() {
    const formData = {
        name: document.getElementById('name').value,
        description: document.getElementById('description').value
    };

    try {
        const response = await fetch('/admin/programs', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        if (response.ok) {
            location.reload();
        } else {
            throw new Error('Failed to add program');
        }
    } catch (error) {
        handleApiError(error);
    }
}

// Edit program
async function editProgram(programId) {
    const response = await fetch(`/admin/programs/${programId}`);
    const program = await response.json();

    document.getElementById('editProgramId').value = program.id;
    document.getElementById('editName').value = program.name;
    document.getElementById('editDescription').value = program.description;

    new bootstrap.Modal(document.getElementById('editProgramModal')).show();
}

async function updateProgram() {
    const programId = document.getElementById('editProgramId').value;
    const formData = {
        name: document.getElementById('editName').value,
        description: document.getElementById('editDescription').value
    };

    try {
        const response = await fetch(`/admin/programs/${programId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        if (response.ok) {
            location.reload();
        } else {
            throw new Error('Failed to update program');
        }
    } catch (error) {
        handleApiError(error);
    }
}

// Delete program
async function deleteProgram(programId) {
    if (!confirmDelete('Are you sure you want to delete this program? This will also delete all associated FAQs.')) {
        return;
    }

    try {
        const response = await fetch(`/admin/programs/${programId}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            document.getElementById(`program-${programId}`).remove();
        } else {
            throw new Error('Failed to delete program');
        }
    } catch (error) {
        handleApiError(error);
    }
}
</script>
{% endblock %}
