{% extends "base/base.html" %}
{% block title %}Login{% endblock %}

{% block content %}

<!-- Hero Message Section -->
<div class="hero-message silver-scroll">
    <div class="container">
        <h2 class="mb-0" data-aos="fade-up">KWC Staff Login</h2>
    </div>
</div>

<!-- Login Section -->
<section class="section section-white">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-gold gold-scroll shadow-lg" data-aos="fade-up">
                    <div class="card-body py-2 px-5">
                        <form method="POST">
                            <!-- Username Input -->
                            <div class="mb-4">
                                <label for="usernameInput" class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    <input type="text" class="form-control" id="usernameInput" name="username"
                                        placeholder="Enter your username" required>
                                </div>
                            </div>

                            <!-- Password Input -->
                            <div class="mb-4">
                                <label for="passwordInput" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="passwordInput" name="password"
                                        placeholder="Enter your password" required>
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-black black-shine-animation">
                                    Login
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock content %}
