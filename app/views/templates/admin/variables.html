{% extends "admin/base.html" %}

{% block admin_content %}
<div class="card">
    <div class="card-header">
        <h2 class="mb-0">Webpage Variables</h2>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" name="phone"
                       value="{{ variables.phone }}" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email"
                       value="{{ variables.email }}" required>
            </div>

            <div class="mb-3">
                <label for="service_address" class="form-label">Service Address</label>
                <input type="text" class="form-control" id="service_address" name="service_address"
                       value="{{ variables.service_address }}" required>
            </div>

            <div class="mb-3">
                <label for="mailing_address" class="form-label">Mailing Address</label>
                <input type="text" class="form-control" id="mailing_address" name="mailing_address"
                       value="{{ variables.mailing_address }}" required>
            </div>

            <div class="mb-3">
                <label for="location" class="form-label">Service Location Coordinates</label>
                <input type="text" class="form-control" id="location" name="location"
                       value="{{ variables.location }}" required
                       placeholder="e.g. 45.5155,-122.6789">
                <small class="form-text text-muted">Format: latitude,longitude</small>
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
