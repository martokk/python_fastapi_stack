{% extends "admin/base.html" %}

{% block title %}Partners{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h2 class="mb-0">Partners</h2>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPartnerModal">
            <i class="fas fa-plus"></i> Add Partner
        </button>
    </div>
    <div class="card-body">
        <div class="row" id="partnerList">
            {% for partner in partners %}
            <div class="col-md-4 mb-4" id="partner-{{ partner.id }}">
                <div class="card h-100">
                    <img src="{{ partner.logo_url }}" class="card-img-top" alt="{{ partner.name }}" style="height: 150px; object-fit: contain; padding: 1rem;">
                    <div class="card-body">
                        <h5 class="card-title">{{ partner.name }}</h5>
                        <p class="card-text">
                            <a href="{{ partner.url }}" target="_blank">{{ partner.url }}</a>
                        </p>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-primary" onclick="editPartner({{ partner.id }})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deletePartner({{ partner.id }})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<!-- Add Partner Modal -->
<div class="modal fade" id="addPartnerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Partner</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addPartnerForm">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="url" class="form-label">Website URL</label>
                        <input type="url" class="form-control" id="url" required>
                    </div>
                    <div class="mb-3">
                        <label for="logo" class="form-label">Logo</label>
                        <input type="file" class="form-control" id="logo" accept="image/*" required>
                        <img id="logoPreview" class="mt-2 img-thumbnail d-none" style="max-height: 150px;">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="submitPartnerForm()">Add Partner</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Partner Modal -->
<div class="modal fade" id="editPartnerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Partner</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editPartnerForm">
                    <input type="hidden" id="editPartnerId">
                    <div class="mb-3">
                        <label for="editName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="editName" required>
                    </div>
                    <div class="mb-3">
                        <label for="editUrl" class="form-label">Website URL</label>
                        <input type="url" class="form-control" id="editUrl" required>
                    </div>
                    <div class="mb-3">
                        <label for="editLogo" class="form-label">Logo (optional)</label>
                        <input type="file" class="form-control" id="editLogo" accept="image/*">
                        <img id="editLogoPreview" class="mt-2 img-thumbnail" style="max-height: 150px;">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updatePartner()">Update Partner</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Preview image uploads
document.getElementById('logo').addEventListener('change', function() {
    previewImage(this, document.getElementById('logoPreview'));
    document.getElementById('logoPreview').classList.remove('d-none');
});

document.getElementById('editLogo').addEventListener('change', function() {
    previewImage(this, document.getElementById('editLogoPreview'));
});

// Add new partner
async function submitPartnerForm() {
    const formData = new FormData();
    formData.append('name', document.getElementById('name').value);
    formData.append('url', document.getElementById('url').value);
    formData.append('logo', document.getElementById('logo').files[0]);

    try {
        const partner = await submitFormWithFiles('/admin/partners', formData);
        location.reload();
    } catch (error) {
        handleApiError(error);
    }
}

// Edit partner
async function editPartner(partnerId) {
    const response = await fetch(`/admin/partners/${partnerId}`);
    const partner = await response.json();

    document.getElementById('editPartnerId').value = partner.id;
    document.getElementById('editName').value = partner.name;
    document.getElementById('editUrl').value = partner.url;
    document.getElementById('editLogoPreview').src = partner.logo_url;

    new bootstrap.Modal(document.getElementById('editPartnerModal')).show();
}

async function updatePartner() {
    const partnerId = document.getElementById('editPartnerId').value;
    const formData = new FormData();
    formData.append('name', document.getElementById('editName').value);
    formData.append('url', document.getElementById('editUrl').value);

    const logoInput = document.getElementById('editLogo');
    if (logoInput.files.length > 0) {
        formData.append('logo', logoInput.files[0]);
    }

    try {
        const partner = await submitFormWithFiles(`/admin/partners/${partnerId}`, formData, 'PUT');
        location.reload();
    } catch (error) {
        handleApiError(error);
    }
}

// Delete partner
async function deletePartner(partnerId) {
    if (!confirmDelete('Are you sure you want to delete this partner?')) {
        return;
    }

    try {
        const response = await fetch(`/admin/partners/${partnerId}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            document.getElementById(`partner-${partnerId}`).remove();
        } else {
            throw new Error('Failed to delete partner');
        }
    } catch (error) {
        handleApiError(error);
    }
}
</script>
{% endblock %}
