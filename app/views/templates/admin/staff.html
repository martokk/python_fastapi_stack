{% extends "admin/base.html" %}

{% block title %}Staff Management{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h2 class="mb-0">Staff Members</h2>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addStaffModal">
            <i class="fas fa-plus"></i> Add Staff Member
        </button>
    </div>
    <div class="card-body">
        <div class="row" id="staffList">
            {% for staff in staff_members %}
            <div class="col-md-4 mb-4" id="staff-{{ staff.id }}">
                <div class="card h-100">
                    <img src="{{ staff.photo_url }}" class="card-img-top" alt="{{ staff.name }}" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">{{ staff.name }}</h5>
                        <p class="card-text">{{ staff.position }}</p>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-primary" onclick="editStaff({{ staff.id }})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteStaff({{ staff.id }})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<!-- Add Staff Modal -->
<div class="modal fade" id="addStaffModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Staff Member</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addStaffForm">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="position" class="form-label">Position</label>
                        <input type="text" class="form-control" id="position" required>
                    </div>
                    <div class="mb-3">
                        <label for="photo" class="form-label">Photo</label>
                        <input type="file" class="form-control" id="photo" accept="image/*" required>
                        <img id="photoPreview" class="mt-2 img-thumbnail d-none" style="max-height: 200px;">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="submitStaffForm()">Add Staff Member</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Staff Modal -->
<div class="modal fade" id="editStaffModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Staff Member</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editStaffForm">
                    <input type="hidden" id="editStaffId">
                    <div class="mb-3">
                        <label for="editName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="editName" required>
                    </div>
                    <div class="mb-3">
                        <label for="editPosition" class="form-label">Position</label>
                        <input type="text" class="form-control" id="editPosition" required>
                    </div>
                    <div class="mb-3">
                        <label for="editPhoto" class="form-label">Photo (optional)</label>
                        <input type="file" class="form-control" id="editPhoto" accept="image/*">
                        <img id="editPhotoPreview" class="mt-2 img-thumbnail" style="max-height: 200px;">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateStaff()">Update Staff Member</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Preview image uploads
document.getElementById('photo').addEventListener('change', function() {
    previewImage(this, document.getElementById('photoPreview'));
    document.getElementById('photoPreview').classList.remove('d-none');
});

document.getElementById('editPhoto').addEventListener('change', function() {
    previewImage(this, document.getElementById('editPhotoPreview'));
});

// Add new staff member
async function submitStaffForm() {
    const formData = new FormData();
    formData.append('name', document.getElementById('name').value);
    formData.append('position', document.getElementById('position').value);
    formData.append('photo', document.getElementById('photo').files[0]);

    try {
        const staff = await submitFormWithFiles('/admin/staff', formData);
        location.reload();
    } catch (error) {
        handleApiError(error);
    }
}

// Edit staff member
async function editStaff(staffId) {
    const response = await fetch(`/admin/staff/${staffId}`);
    const staff = await response.json();

    document.getElementById('editStaffId').value = staff.id;
    document.getElementById('editName').value = staff.name;
    document.getElementById('editPosition').value = staff.position;
    document.getElementById('editPhotoPreview').src = staff.photo_url;

    new bootstrap.Modal(document.getElementById('editStaffModal')).show();
}

async function updateStaff() {
    const staffId = document.getElementById('editStaffId').value;
    const formData = new FormData();
    formData.append('name', document.getElementById('editName').value);
    formData.append('position', document.getElementById('editPosition').value);

    const photoInput = document.getElementById('editPhoto');
    if (photoInput.files.length > 0) {
        formData.append('photo', photoInput.files[0]);
    }

    try {
        const staff = await submitFormWithFiles(`/admin/staff/${staffId}`, formData, 'PUT');
        location.reload();
    } catch (error) {
        handleApiError(error);
    }
}

// Delete staff member
async function deleteStaff(staffId) {
    if (!confirmDelete('Are you sure you want to delete this staff member?')) {
        return;
    }

    try {
        const response = await fetch(`/admin/staff/${staffId}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            document.getElementById(`staff-${staffId}`).remove();
        } else {
            throw new Error('Failed to delete staff member');
        }
    } catch (error) {
        handleApiError(error);
    }
}
</script>
{% endblock %}
