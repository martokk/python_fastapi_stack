{% extends "admin/base.html" %}

{% block head %}
{{ super() }}
<!-- Include Quill stylesheet -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<!-- Include the Quill library -->
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<style>
    #htmlEditor {
        width: 100%;
        height: 500px;
        font-family: monospace;
        padding: 10px;
        display: none;
        margin-bottom: 1rem;
        border: 1px solid #ccc;
    }
</style>
{% endblock %}

{% block admin_content %}
<div class="container py-2">
    <h2>Edit Wishlist</h2>

    <div class="card">
        <div class="card-body">
            <form id="wishlistForm" method="POST" action="{{ url_for('admin_wishlist') }}">
                <!-- Hidden input to store HTML content -->
                <input type="hidden" name="content" id="hiddenContent">

                <!-- Editor toggle button -->
                <div class="mb-3">
                    <button type="button" class="btn btn-secondary" id="toggleEditor">Toggle HTML View</button>
                </div>

                <!-- Create the editor container -->
                <div id="editor" style="height: 500px; margin-bottom: 1rem; border: 1px solid #ccc;">{{ wishlist.content | safe if wishlist else "" }}</div>

                <!-- Raw HTML editor -->
                <textarea id="htmlEditor">{{ wishlist.content if wishlist else "" }}</textarea>

                <button type="submit" class="btn btn-primary">Save Wishlist</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block js_scripts %}
{{ super() }}
<script>
// Initialize Quill editor
let quill;
let isQuillView = true;

document.addEventListener('DOMContentLoaded', function() {
    console.log('DOM loaded, initializing Quill...');
    try {
        quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'list': 'bullet' }],
                    [{ 'indent': '-1'}, { 'indent': '+1' }],
                    //[{ 'color': [] }, { 'background': [] }],
                    ['clean']
                ]
            }
        });
        console.log('Quill initialized successfully');

        // Add form submit handler
        document.getElementById('wishlistForm').addEventListener('submit', function(e) {
            e.preventDefault();
            try {
                const content = isQuillView ? quill.root.innerHTML : document.getElementById('htmlEditor').value;
                document.getElementById('hiddenContent').value = content;
                console.log('Content set:', content);
                this.submit();
            } catch (error) {
                console.error('Error submitting form:', error);
            }
        });

        // Add toggle button handler
        document.getElementById('toggleEditor').addEventListener('click', function() {
            const quillEditor = document.getElementById('editor');
            const htmlEditor = document.getElementById('htmlEditor');
            const toggleBtn = document.getElementById('toggleEditor');

            if (isQuillView) {
                // Switch to HTML view
                htmlEditor.value = quill.root.innerHTML;
                quillEditor.style.display = 'none';
                htmlEditor.style.display = 'block';
                toggleBtn.textContent = 'Switch to Rich Text';
            } else {
                // Switch to Quill view
                quill.root.innerHTML = htmlEditor.value;
                quillEditor.style.display = 'block';
                htmlEditor.style.display = 'none';
                toggleBtn.textContent = 'Switch to HTML';
            }
            isQuillView = !isQuillView;
        });
    } catch (error) {
        console.error('Error initializing Quill:', error);
    }
});
</script>
{% endblock %}
