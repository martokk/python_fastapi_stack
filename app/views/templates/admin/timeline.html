{% extends "admin/base.html" %}

{% block title %}Timeline{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h2 class="mb-0">Timeline</h2>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addTimelineModal">
            <i class="fas fa-plus"></i> Add Timeline Entry
        </button>
    </div>
    <div class="card-body">
        <div class="timeline-container">
            {% for item in timeline %}
            <div class="timeline-item" id="timeline-{{ item.id }}">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">{{ item.title }}</h5>
                        <h6 class="card-subtitle mb-2 text-muted">{{ item.date }}</h6>
                        <p class="card-text">{{ item.description }}</p>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-primary" onclick="editTimelineEntry({{ item.id }})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteTimelineEntry({{ item.id }})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<!-- Add Timeline Entry Modal -->
<div class="modal fade" id="addTimelineModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add Timeline Entry</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addTimelineForm">
                    <div class="mb-3">
                        <label for="date" class="form-label">Date</label>
                        <input type="date" class="form-control" id="date" required>
                    </div>
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" rows="3" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="submitTimelineForm()">Add Entry</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Timeline Entry Modal -->
<div class="modal fade" id="editTimelineModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Timeline Entry</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editTimelineForm">
                    <input type="hidden" id="editTimelineId">
                    <div class="mb-3">
                        <label for="editDate" class="form-label">Date</label>
                        <input type="date" class="form-control" id="editDate" required>
                    </div>
                    <div class="mb-3">
                        <label for="editTitle" class="form-label">Title</label>
                        <input type="text" class="form-control" id="editTitle" required>
                    </div>
                    <div class="mb-3">
                        <label for="editDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="editDescription" rows="3" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateTimelineEntry()">Update Entry</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Add new timeline entry
async function submitTimelineForm() {
    const formData = {
        date: document.getElementById('date').value,
        title: document.getElementById('title').value,
        description: document.getElementById('description').value
    };

    try {
        const response = await fetch('/admin/timeline', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        if (response.ok) {
            location.reload();
        } else {
            throw new Error('Failed to add timeline entry');
        }
    } catch (error) {
        handleApiError(error);
    }
}

// Edit timeline entry
async function editTimelineEntry(entryId) {
    const response = await fetch(`/admin/timeline/${entryId}`);
    const entry = await response.json();

    document.getElementById('editTimelineId').value = entry.id;
    document.getElementById('editDate').value = formatDateForInput(entry.date);
    document.getElementById('editTitle').value = entry.title;
    document.getElementById('editDescription').value = entry.description;

    new bootstrap.Modal(document.getElementById('editTimelineModal')).show();
}

async function updateTimelineEntry() {
    const entryId = document.getElementById('editTimelineId').value;
    const formData = {
        date: document.getElementById('editDate').value,
        title: document.getElementById('editTitle').value,
        description: document.getElementById('editDescription').value
    };

    try {
        const response = await fetch(`/admin/timeline/${entryId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        if (response.ok) {
            location.reload();
        } else {
            throw new Error('Failed to update timeline entry');
        }
    } catch (error) {
        handleApiError(error);
    }
}

// Delete timeline entry
async function deleteTimelineEntry(entryId) {
    if (!confirmDelete('Are you sure you want to delete this timeline entry?')) {
        return;
    }

    try {
        const response = await fetch(`/admin/timeline/${entryId}`, {
            method: 'DELETE'
        });

        if (response.ok) {
            document.getElementById(`timeline-${entryId}`).remove();
        } else {
            throw new Error('Failed to delete timeline entry');
        }
    } catch (error) {
        handleApiError(error);
    }
}
</script>
{% endblock %}
