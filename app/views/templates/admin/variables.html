{% extends "admin/base.html" %}

{% block admin_content %}
<div class="card">
    <div class="card-header">
        <h2 class="mb-0">Webpage Variables</h2>
    </div>
    <div class="card-body">
        <form id="variablesForm" method="POST">
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" name="phone"
                       value="{{ variables.phone }}" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email"
                       value="{{ variables.email }}" required>
            </div>

            <div class="mb-3">
                <label for="service_address_1" class="form-label">Service Address Line 1</label>
                <input type="text" class="form-control" id="service_address_1" name="service_address_1" 
                       value="{{ variables.service_address_1 }}" required>
            </div>

            <div class="mb-3">
                <label for="service_address_2" class="form-label">Service Address Line 2</label>
                <input type="text" class="form-control" id="service_address_2" name="service_address_2" 
                       value="{{ variables.service_address_2 }}">
            </div>

            <div class="mb-3">
                <label for="mailing_address_1" class="form-label">Mailing Address Line 1</label>
                <input type="text" class="form-control" id="mailing_address_1" name="mailing_address_1" 
                       value="{{ variables.mailing_address_1 }}" required>
            </div>

            <div class="mb-3">
                <label for="mailing_address_2" class="form-label">Mailing Address Line 2</label>
                <input type="text" class="form-control" id="mailing_address_2" name="mailing_address_2" 
                       value="{{ variables.mailing_address_2 }}">
            </div>

            <div class="mb-3">
                <label for="location" class="form-label">Service Location Coordinates</label>
                <input type="text" class="form-control" id="location" name="location"
                       value="{{ variables.location }}" required
                       placeholder="e.g. 45.5155,-122.6789">
                <small class="form-text text-muted">Format: latitude,longitude</small>
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('variablesForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = {
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        service_address_1: document.getElementById('service_address_1').value,
        service_address_2: document.getElementById('service_address_2').value,
        mailing_address_1: document.getElementById('mailing_address_1').value,
        mailing_address_2: document.getElementById('mailing_address_2').value,
        location: document.getElementById('location').value
    };

    try {
        const response = await fetch('/admin/variables', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        if (response.ok) {
            alert('Variables updated successfully!');
        } else {
            throw new Error('Failed to update variables');
        }
    } catch (error) {
        alert('Error: ' + error.message);
    }
});
</script>
{% endblock %}
